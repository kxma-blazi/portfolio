<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHARAT I.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #010204;
            --surface: rgba(6, 12, 26, 0.95);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text: #e2e8f0;
            --border: rgba(56, 189, 248, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Space Grotesk', 'Noto Sans Thai', sans-serif; }

        /* Background Animation */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 24px; }

        /* 🤖 CYBER SCANNER UNIT 🤖 */
        .scanner-section {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            max-width: 600px;
            margin: 0 auto;
        }

        .scanner-title {
            font-family: 'IBM Plex Mono';
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        /* กล่อง QR พร้อมเส้นเลเซอร์ */
        .qr-scanner-box {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 5px solid #111;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .qr-scanner-box img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* เส้นเลเซอร์สแกนเนอร์ */
        .laser-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent);
            animation: scan-move 2.5s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes scan-move {
            0% { top: 5%; opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        /* ข้อมูลติดต่อ */
        .contact-info { margin-top: 35px; }
        .contact-info h2 { font-family: 'Syne'; font-size: 2rem; margin-bottom: 5px; }
        .line-id {
            display: inline-block;
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'IBM Plex Mono';
            font-weight: 700;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.7rem;
            color: var(--muted);
            font-family: 'IBM Plex Mono';
            opacity: 0.5;
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="container">
    <div class="scanner-section">
        <div class="scanner-title">[ Connection_Protocol: Activated ]</div>
        
        <div class="qr-scanner-box">
            <div class="laser-line"></div>
            
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://line.me/ti/p/kingkumaallday" alt="Line QR Code">
        </div>

        <div class="contact-info">
            <h2>SAHARAT INTAVIRA</h2>
            <p style="color: #888;">Scan to add me on LINE or use ID below</p>
            <div class="line-id">ID: kingkumaallday</div>
        </div>

        <div style="margin-top: 30px;">
            <a href="mailto:okumakung2018@gmail.com" style="color: var(--accent); text-decoration: none; font-family: 'IBM Plex Mono'; font-size: 0.8rem;">
                > SEND_DIRECT_EMAIL
            </a>
        </div>

        <div class="footer-text">SECURE_ACCESS_PORTAL_V5.0</div>
    </div>
</div>

<script>
    // Matrix Background Effect
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(1, 2, 4, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f2ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 50);

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
