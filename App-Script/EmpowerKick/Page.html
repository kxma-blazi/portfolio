<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
  
  body {
    font-family: 'Kanit', sans-serif;
    background: #f8f9fa;
    color: #333;
    margin: 0;
    padding: 20px;
  }
  button {
    background: #1a73e8;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover { background: #1557b0; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  
  input, select, textarea {
    width: 100%;
    padding: 8px;
    margin: 5px 0 15px 0;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
  }

  /* ตารางสินค้ารูปแบบ Grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }
  .product-card {
    background: white;
    border-radius: 8px;
    padding: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    text-align: center;
  }
  .product-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    background: #eee;
  }
</style>

<script>
  function showAlert(message) { alert(message); }
</script>
